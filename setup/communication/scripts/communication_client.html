<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cliente WebSocket</title>
</head>
<body>
  <h1>Prueba de WebSocket</h1>
  <div id="messages"></div>
  <input id="msgInput" type="text" placeholder="Escribe un mensaje">
  <button id="sendBtn">Enviar</button>

  <script>
    async function init() {
      const response = await fetch("com_vars.json");
      const config = await response.json();
  
      const wsUrl = `ws://${config.server_ip}:${config.communication_port}/?token=${config.com_token}`;
      const socket = new WebSocket(wsUrl);
  
      const messagesDiv = document.getElementById("messages");
      const msgInput = document.getElementById("msgInput");
      const sendBtn = document.getElementById("sendBtn");
  
      function addMessage(text) {
        const p = document.createElement('p');
        p.textContent = text;
        messagesDiv.appendChild(p);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
  
      socket.onopen = () => {
        addMessage("Connecting to server...");
      };
  
      socket.onmessage = (event) => {
        console.log("Received mesage :", event.data);
        addMessage(`Servidor: ${event.data}`);
      };
  
      socket.onerror = (error) => {
        addMessage(`Error: ${error}`);
      };
  
      socket.onclose = () => {
        addMessage("Conexión cerrada");
      };
  
      sendBtn.onclick = () => {
        const message = msgInput.value.trim();
        if (!message) return;
        socket.send(message);
        addMessage(`Enviado: ${message}`);
        msgInput.value = "";
      };
    }
  
    init();
  </script>

</body>
</html>
